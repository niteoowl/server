<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Langvid - 스마트 외국어 학습 시스템</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts: Noto Sans KR, Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 8px;">
                    <span class="emoji">🏠</span>
                    <span class="logo-text">Langvid</span>
                </a>
            </div>
            <div class="header-actions">
                <button id="import-srt-btn" class="btn btn-text">📁 Import SRT</button>
            </div>
        </div>
    </header>

    <main class="app-container">
        <!-- Left: Video Player Section -->
        <section class="player-section">
            <div class="video-container">
                <div class="video-wrapper">
                    <div id="yt-player"></div>
                    <!-- Invisible overlay for click to play/pause only -->
                    <div id="video-surface" class="video-surface"></div>
                </div>
                
                <!-- NEW Dedicated Subtitle Area BELOW the video -->
                <div id="subtitle-area" class="subtitle-area">
                    <div id="current-subtitle" class="current-subtitle">
                        Start or import a video to begin.
                    </div>
                    <div id="current-translation" class="current-translation"></div>
                </div>
            </div>

            <div class="progress-container">
                <div id="progress-bar" class="progress-bar">
                    <div id="progress-filled" class="progress-filled"></div>
                </div>
            </div>

            <!-- Player Controls -->
            <div class="player-controls">
                <div class="control-group">
                    <button id="play-pause" class="btn-ghost">▶️</button>
                    <button id="replay-btn" class="btn-ghost" title="Replay">↺</button>
                    <div class="time-display">
                        <span id="current-time">0:00</span> / <span id="duration">0:00</span>
                    </div>
                </div>
                
                <div class="control-group">
                    <div class="speed-selector">
                        <button class="speed-btn" data-speed="0.75">0.75x</button>
                        <button class="speed-btn active" data-speed="1.0">1x</button>
                        <button class="speed-btn" data-speed="1.5">1.5x</button>
                    </div>
                    <button id="toggle-bs-mode" class="btn-ghost">🧩 Study Mode</button>
                </div>
            </div>

            <div class="lesson-info">
                <h1 id="video-title">YouTube Study - English Listening</h1>
                <p id="video-desc">Interactive language learning with contextual subtitles.</p>
            </div>
        </section>

        <!-- Right: Activity Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-tabs">
                <button class="tab-btn active" data-tab="script">📄 Script</button>
                <button class="tab-btn" data-tab="words">⭐ My Words</button>
                <button class="tab-btn" data-tab="dictionary">🔍 Search</button>
            </div>

            <div class="tab-content" id="script-tab">
                <div class="sidebar-header">
                    <h4>All Scripts</h4>
                    <button id="export-script" class="btn-text">Export</button>
                </div>
                <div id="script-list" class="script-list">
                    <div class="empty-state">Import an SRT to begin.</div>
                </div>
            </div>

            <div class="tab-content hidden" id="words-tab">
                <div class="sidebar-header">
                    <h3>내 단어장</h3>
                    <div class="sidebar-actions">
                        <button id="clear-words" class="btn-text">모두 삭제</button>
                    </div>
                </div>
                <div id="words-list" class="words-list">
                    <!-- Words will be populated here -->
                </div>
            </div>

            <div class="tab-content hidden" id="dictionary-tab">
                <div class="search-box">
                    <input type="text" id="dict-search-input" placeholder="검색할 단어를 입력하세요...">
                    <button id="dict-search-btn"><i class="fas fa-search"></i></button>
                </div>
                <div id="dict-result" class="dict-result">
                    <div class="empty-state">학습 중 모르는 단어를 클릭하거나 검색하세요.</div>
                </div>
            </div>
        </aside>
    </main>

    <!-- Word Detail Popup (BS Mode) -->
    <div id="word-popup" class="word-popup hidden">
        <div class="popup-content">
            <div class="popup-header">
                <h2 id="popup-word">Word</h2>
                <button id="popup-tts" class="btn-icon"><i class="fas fa-volume-up"></i></button>
                <button id="close-popup" class="btn-icon close"><i class="fas fa-times"></i></button>
            </div>
            <div class="popup-body">
                <div id="popup-phonetic" class="phonetic">/wɜːd/</div>
                <div id="popup-meaning" class="meaning">뜻을 불러오는 중...</div>
                <div id="popup-example" class="example">Examples will appear here.</div>
            </div>
            <div class="popup-footer">
                <button id="save-word-btn" class="btn-blue">⭐ Save to Words</button>
            </div>
        </div>
    </div>

    <!-- Hidden Input for File Import -->
    <input type="file" id="srt-input" accept=".srt" style="display: none;">

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="js/player.js"></script>
    <script src="js/subtitles.js"></script>
    <script src="js/vocabulary.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
